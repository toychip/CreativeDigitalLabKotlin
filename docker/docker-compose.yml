services:
  mysql:
    image: mysql:8.4
    container_name: chat-cdl-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: creative-digital-lab-chat
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chat-network

  redis:
    image: redis:7-alpine
    container_name: chat-cdl-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - chat-network

  chat-app-1:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: chat-cdl-app-1
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - chat-network

  chat-app-2:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: chat-cdl-app-2
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - chat-network

  chat-app-3:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: chat-cdl-app-3
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - chat-network

  nginx:
    image: nginx:alpine
    container_name: chat-cdl-nginx
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - chat-app-1
      - chat-app-2
      - chat-app-3
    networks:
      - chat-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  chat-network:
    driver: bridge
